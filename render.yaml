services:
  - type: web
    name: proweb-exam-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: RESULTS_CHAT_ID
        sync: false
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: WEBHOOK_PATH
        value: /webhook
      - key: WEBHOOK_SECRET
        generateValue: true
